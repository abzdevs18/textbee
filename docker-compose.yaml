services:
  # MongoDB service
  gabay-sms-db:
    container_name: gabay-sms-db
    image: mongo:latest
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-adminUser}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASS:-adminPassword}
      - MONGO_INITDB_DATABASE=gabay_sms
    volumes:
      # - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - mongodb_data:/data/db
    ports:
      - "${MONGO_PORT:-27018}:27017"
    networks:
      - gabay-sms-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # MongoDB Express (optional admin UI)
  mongo-express:
    container_name: gabay-sms-mongo-express
    image: mongo-express:latest
    restart: always
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_ROOT_USER:-adminUser}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_ROOT_PASS:-adminPassword}
      - ME_CONFIG_MONGODB_SERVER=gabay-sms-db
    depends_on:
      gabay-sms-db:
        condition: service_healthy
    networks:
      - gabay-sms-network

  # NestJS API
  gabay-sms-api:
    container_name: gabay-sms-api
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${API_PORT:-3001}:3001"
    env_file:
      - ./api/.env
    environment:
      - PORT=3001
      - REDIS_URL=${REDIS_URL:-redis://gabay-sms-redis:6379}

    depends_on:
      gabay-sms-db:
        condition: service_healthy
    networks:
      - gabay-sms-network

  # Next.js Web
  gabay-sms-web:
    container_name: gabay-sms-web
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - ./web/.env
    environment:
      - PORT=3000
      - CONTAINER_RUNTIME=docker
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-https://sms.gabay.online/api/v1}
      - INTERNAL_API_BASE_URL=${INTERNAL_API_BASE_URL:-http://gabay-sms-api:3001/api/v1}

    depends_on:
      - gabay-sms-api
    networks:
      - gabay-sms-network

  # Redis (if SMS queue is needed)
  gabay-sms-redis:
    container_name: gabay-sms-redis
    image: redis:alpine
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - gabay-sms-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  gabay-sms-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
